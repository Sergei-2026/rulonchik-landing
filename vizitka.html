<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Татьяна Гулимова — Рулончик</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(155deg, #f2ede6 0%, #e8e2d8 55%, #ede7de 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle warm ambient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 12% 65%, rgba(196, 154, 123, 0.12) 0%, transparent 65%),
        radial-gradient(ellipse 45% 40% at 88% 20%, rgba(224, 186, 148, 0.09) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 28px;
      padding: 48px 40px 44px;
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.04),
        0 4px 16px rgba(0, 0, 0, 0.07),
        0 16px 48px rgba(0, 0, 0, 0.08),
        0 32px 80px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    /* ─── Logo ─────────────────────────────────────── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 34px;
    }

    .logo-img {
      height: 60px;
      width: auto;
      max-width: 100%;
      display: block;
      object-fit: contain;
    }

    @media (max-width: 540px) {
      .logo-img { height: 48px; }
    }

    /* ─── Decorative gold line ──────────────────────── */
    .deco-line {
      width: 64px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c49a6a 30%, #e2b880 50%, #c49a6a 70%, transparent);
      margin: 0 auto 22px;
    }

    /* ─── Name ──────────────────────────────────────── */
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 2.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.2;
      background: linear-gradient(135deg, #7a4220 0%, #a05e2e 45%, #b87840 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    /* ─── Role ──────────────────────────────────────── */
    .role {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(60, 40, 20, 0.45);
      margin-bottom: 20px;
    }

/* ─── Specialization ────────────────────────────── */
    .spec-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-bottom: 26px;
    }

    .spec-icon { color: rgba(160, 110, 60, 0.45); flex-shrink: 0; }

    .spec-text {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(60, 40, 20, 0.38);
    }

    /* ─── Social buttons ────────────────────────────── */
    .socials {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      background: rgba(0, 0, 0, 0.025);
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #3a3a3a;
      transition: background 0.25s ease, border-color 0.25s ease,
                  color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
    }

    .social-btn svg { flex-shrink: 0; transition: color 0.25s ease; }

    .social-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    .social-btn.tg  { --c: #2ca5e0; }
    .social-btn.vk  { --c: #4680c2; }
    .social-btn.ig  { --c: #c13584; }

    .social-btn:hover { background: color-mix(in srgb, var(--c) 8%, transparent); border-color: color-mix(in srgb, var(--c) 35%, transparent); color: var(--c); }

    /* ─── Divider ───────────────────────────────────── */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.07), transparent);
      margin-bottom: 26px;
    }

    /* ─── Contacts ──────────────────────────────────── */
    .contacts {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 26px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 16px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(0, 0, 0, 0.06);
      cursor: pointer;
      transition: background 0.28s ease, border-color 0.28s ease, transform 0.28s ease, box-shadow 0.28s ease;
      text-decoration: none;
      color: inherit;
      user-select: none;
    }

    .contact-item:hover {
      background: rgba(196, 148, 88, 0.06);
      border-color: rgba(176, 130, 70, 0.22);
      transform: translateX(5px);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
    }

    .contact-item:hover .ci-icon { color: #b07840; }

    .ci-icon {
      width: 19px;
      height: 19px;
      color: rgba(0, 0, 0, 0.28);
      transition: color 0.28s ease;
      flex-shrink: 0;
    }

    .ci-body { flex: 1; text-align: left; }

    .ci-label {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.3);
      margin-bottom: 2px;
    }

    .ci-value {
      font-size: 0.875rem;
      font-weight: 400;
      color: #2c2c2c;
    }

    .ci-hint {
      font-size: 0.62rem;
      letter-spacing: 0.03em;
      color: rgba(160, 110, 50, 0.5);
      opacity: 0;
      transition: opacity 0.28s ease;
      white-space: nowrap;
    }

    .contact-item:hover .ci-hint { opacity: 1; }

    /* ─── Toast ─────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(28, 22, 16, 0.94);
      border: 1px solid rgba(196, 154, 100, 0.3);
      border-radius: 100px;
      padding: 10px 22px;
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.04em;
      color: rgba(230, 190, 140, 0.92);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Responsive ────────────────────────────────── */
    @media (max-width: 540px) {
      body { padding: 20px 16px; align-items: flex-start; padding-top: 32px; }
      .card { padding: 36px 24px 36px; border-radius: 22px; }
      .name { font-size: 1.72rem; }
      .spec-text { font-size: 0.67rem; }
    }
  </style>
</head>

<!-- Toast -->
<div class="toast" id="toast">Номер скопирован</div>

<script>
  function copyPhone() {
    const phone = '+7 916 582 70 67';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(phone).then(showToast).catch(() => fallbackCopy(phone));
    } else {
      fallbackCopy(phone);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    showToast();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2600);
  }

</script>
