<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#6B3FA0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Контент">
  <title>Генератор постов</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --purple:  #6B3FA0; --purple2: #8B5CC8; --purple3: #F3EEFF;
      --green:   #2E7D32; --green2:  #E8F5E9;
      --red:     #C62828; --red2:    #FFEBEE;
      --gray: #F5F5F5; --border: #DDD; --text: #222; --muted: #888; --radius: 12px;
    }
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--gray); color:var(--text); min-height:100vh; padding-bottom:30px; }
    header { background:var(--purple); color:#fff; padding:16px 20px 14px; position:sticky; top:0; z-index:100; }
    header h1 { font-size:18px; font-weight:700; }
    header p  { font-size:12px; opacity:.75; margin-top:3px; }
    .container { padding:16px; max-width:600px; margin:0 auto; }
    .card { background:#fff; border-radius:var(--radius); padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:14px; }
    .card-title { font-size:13px; font-weight:700; color:var(--purple); text-transform:uppercase; letter-spacing:.4px; margin-bottom:12px; }
    .form-row { margin-bottom:12px; }
    .form-row label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
    .form-row input, .form-row select, .form-row textarea {
      width:100%; padding:11px 13px; border:1.5px solid var(--border); border-radius:8px;
      font-size:15px; background:#fff; color:var(--text); -webkit-appearance:none; font-family:inherit;
    }
    .form-row textarea { resize:vertical; min-height:80px; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline:none; border-color:var(--purple2); }
    .networks { display:flex; gap:8px; flex-wrap:wrap; }
    .net-btn { display:flex; align-items:center; gap:6px; padding:8px 14px; border:2px solid var(--border); border-radius:20px; background:#fff; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; color:var(--muted); }
    .net-btn.active { border-color:var(--purple2); background:var(--purple3); color:var(--purple); }
    .net-btn .ni { font-size:18px; }
    .tone-row { display:flex; gap:8px; flex-wrap:wrap; }
    .tone-btn { flex:1; min-width:80px; padding:9px 8px; border:2px solid var(--border); border-radius:8px; background:#fff; font-size:13px; font-weight:600; cursor:pointer; text-align:center; color:var(--muted); transition:all .15s; }
    .tone-btn.active { border-color:var(--purple2); background:var(--purple3); color:var(--purple); }
    .btn-generate { width:100%; padding:15px; background:var(--purple2); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; transition:background .15s; }
    .btn-generate:active { background:var(--purple); }
    .result-block { margin-bottom:12px; }
    .result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .result-net { font-size:13px; font-weight:700; color:var(--purple); display:flex; align-items:center; gap:6px; }
    .btn-copy { padding:5px 12px; background:var(--purple3); border:1.5px solid var(--purple2); border-radius:6px; font-size:12px; font-weight:600; color:var(--purple); cursor:pointer; }
    .btn-copy.copied { background:var(--green2); border-color:var(--green); color:var(--green); }
    .result-text { background:var(--gray); border-radius:8px; padding:12px 14px; font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
    .err { background:var(--red2); border:1.5px solid var(--red); border-radius:8px; padding:12px; font-size:14px; color:var(--red); display:none; margin-bottom:14px; }
  </style>
</head>
<body>
<header>
  <h1>✍️ Генератор постов</h1>
  <p>Магазин тканей · контент для соцсетей</p>
</header>
<div class="container">

  <div class="card">
    <div class="card-title">📋 О чём пост</div>
    <div class="form-row">
      <label>Тип публикации</label>
      <select id="postType">
        <option value="new">🆕 Новинка</option>
        <option value="sale">🏷 Акция / скидка</option>
        <option value="arrival">📦 Поступление товара</option>
        <option value="tip">🧵 Совет по пошиву</option>
        <option value="season">🌸 Сезонная коллекция</option>
      </select>
    </div>
    <div class="form-row">
      <label>Название ткани / товара</label>
      <input type="text" id="product" placeholder="Лён натуральный, хлопок-стрейч…">
    </div>
    <div class="form-row">
      <label>Цена (необязательно)</label>
      <input type="text" id="price" placeholder="450 ₽/м, скидка 20%…">
    </div>
    <div class="form-row">
      <label>Детали (состав, цвета, особенности)</label>
      <textarea id="details" placeholder="100% лён, 12 цветов, ширина 150 см…"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📱 Соцсети</div>
    <div class="networks">
      <button class="net-btn active" data-net="vk"        onclick="toggleNet(this)"><span class="ni">💙</span>ВКонтакте</button>
      <button class="net-btn active" data-net="telegram"  onclick="toggleNet(this)"><span class="ni">✈️</span>Telegram</button>
      <button class="net-btn active" data-net="instagram" onclick="toggleNet(this)"><span class="ni">📸</span>Instagram</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎨 Тон текста</div>
    <div class="tone-row">
      <button class="tone-btn active" data-tone="friendly"     onclick="setTone(this)">😊 Дружелюбный</button>
      <button class="tone-btn"        data-tone="professional" onclick="setTone(this)">👔 Деловой</button>
      <button class="tone-btn"        data-tone="selling"      onclick="setTone(this)">🔥 Продающий</button>
    </div>
  </div>

  <div class="err" id="errBox"></div>
  <button class="btn-generate" onclick="generate()">✨ Сгенерировать посты</button>
  <div id="results" style="margin-top:16px;"></div>
</div>

<script>
let tone = 'friendly';

// ── Шаблоны ─────────────────────────────────────────────────────────────

const OPENS = {
  friendly: [
    "Привет, дорогие! 🤍", "Друзья, у нас кое-что новенькое! ✨", "Спешим поделиться с вами! 🌸",
    "Хорошие новости для всех рукодельниц! 💕", "Девочки, смотрите что у нас! 🎉",
  ],
  professional: [
    "Представляем новинку нашего ассортимента.", "Информируем об обновлении коллекции.",
    "Рады сообщить о поступлении:", "Обновление ассортимента магазина.",
  ],
  selling: [
    "🔥 Только посмотрите на это!", "⚡ Не пропустите!", "💥 Горячая новинка уже в продаже!",
    "🚀 Это именно то, что вы искали!", "✅ Наконец-то в наличии — разберут быстро!",
  ],
};

const BODIES = {
  new: {
    friendly: [
      "В нашем магазине появилась {p} — и мы уже влюбились в неё! {d} Ткань просто создана для уютных изделий.",
      "Знакомьтесь — {p}! {d} Идеальный выбор для тех, кто ценит качество и красоту.",
      "Пополнение ассортимента! {p} — это {d} Уже ждёт вас в магазине.",
    ],
    professional: [
      "В ассортимент магазина добавлена {p}. {d} Материал доступен для заказа.",
      "Новая позиция: {p}. {d} Рекомендуем для пошива качественных изделий.",
    ],
    selling: [
      "Новинка, которую ждали! {p} — {d} Запасы ограничены, успейте выбрать!",
      "{p} — хит этого сезона! {d} Берите сразу несколько цветов, пока есть!",
    ],
  },
  sale: {
    friendly: [
      "Радуем вас приятной новостью — на {p} действует специальная цена! {d} Отличный момент обновить запасы 🎁",
      "Для наших любимых покупателей — скидка на {p}! {d} Успейте воспользоваться предложением 💕",
    ],
    professional: [
      "На {p} установлена специальная цена. {d} Предложение действует ограниченное время.",
      "Акционное предложение: {p}. {d} Уточняйте актуальные условия в магазине.",
    ],
    selling: [
      "🔥 АКЦИЯ! {p} по выгодной цене! {d} Только сейчас — не упустите шанс!",
      "⚡ Скидка на {p}! {d} Это предложение ненадолго — действуй быстрее!",
    ],
  },
  arrival: {
    friendly: [
      "Новое поступление уже в магазине! {p} снова в наличии. {d} Так рады, что успели взять для вас 🌸",
      "Ждали? Дождались! {p} поступила к нам. {d} Приходите выбирать!",
    ],
    professional: [
      "Поступление товара: {p}. {d} Доступно для приобретения.",
      "Получено новое поступление {p}. {d} Актуальный ассортимент — в магазине.",
    ],
    selling: [
      "📦 ПОСТУПЛЕНИЕ! {p} снова в наличии! {d} Разлетается быстро — успейте забрать!",
      "⚡ Ждали — вот! {p} приехала! {d} Первым — лучший выбор!",
    ],
  },
  tip: {
    friendly: [
      "Делимся маленьким секретом 🧵 Если вы работаете с {p}, {d} Попробуйте — и результат вас порадует!",
      "Совет от нашего мастера: {p} — {d} Сохраняйте, чтобы не забыть! 📌",
    ],
    professional: [
      "Рекомендации по работе с {p}: {d} Соблюдение этих правил обеспечит качественный результат.",
      "Технический совет: {p}. {d} Это поможет сохранить внешний вид изделия.",
    ],
    selling: [
      "💡 ЛАЙФХАК с {p}! {d} Применяйте — и ваши изделия будут на высшем уровне!",
      "🧵 Профи-совет по {p}: {d} Сохраняйте и делитесь с подругами!",
    ],
  },
  season: {
    friendly: [
      "Сезон в самом разгаре, и мы подготовили для вас {p}! {d} Создавайте модные образы с удовольствием 🌸",
      "Встречаем сезон вместе! {p} — {d} Вдохновение и ткани — у нас 💕",
    ],
    professional: [
      "Сезонная коллекция пополнена: {p}. {d} Актуальные материалы для текущего сезона.",
    ],
    selling: [
      "🌸 СЕЗОННАЯ КОЛЛЕКЦИЯ! {p} — {d} Успейте выбрать лучшее до конца сезона!",
      "✅ Сезон открыт! {p} — {d} Шейте стильно прямо сейчас!",
    ],
  },
};

const CLOSES = {
  friendly: [
    "Ждём вас в магазине! 💕", "Заходите, будем рады 🌸", "Приходите за вдохновением и тканями! ✨",
    "Всегда рады помочь с выбором 🤍", "До встречи в магазине! 👋",
  ],
  professional: [
    "Приглашаем посетить магазин.", "Обращайтесь, поможем с выбором.",
    "Ждём вас в нашем магазине.", "За подробностями — к нам в магазин.",
  ],
  selling: [
    "Пишите, звоните — поможем! 🔥", "Ждём вас — пока есть в наличии! ⚡",
    "Не откладывайте — приходите сегодня! 💥", "Успейте! Количество ограничено 🚀",
  ],
};

const HASHTAGS = {
  vk: {
    base: "#ткани #магазинтканей #шитьё #рукоделие #пошив",
    new:      "#новинка #новыеткани",
    sale:     "#акция #скидки #выгоднаяцена",
    arrival:  "#поступление #естьвналичии",
    tip:      "#советыпошитью #лайфхак #шитьёдляначинающих",
    season:   "#сезоннаяколлекция #мода",
  },
  instagram: {
    base: "#ткани #магазинтканей #шитьё #рукоделие #пошив #fabric #sewing #handmade #мода #стиль #ткань #шью #рукодельница #шитьёэтолюбовь #своимируками",
    new:      "#новинка #новыеткани #newcollection",
    sale:     "#акция #скидки #распродажа #выгода #sale",
    arrival:  "#поступление #новоепоступление #естьвналичии",
    tip:      "#советыпошитью #лайфхак #шитьёдляначинающих #мастеркласс",
    season:   "#сезоннаяколлекция #весна #лето #мода #тренды",
  },
};

// ── Вспомогательные функции ─────────────────────────────────────────────

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function buildDetails(product, price, details) {
  let parts = [];
  if (details) parts.push(details.trim());
  if (price)   parts.push(`Цена: ${price.trim()}.`);
  return parts.join(' ');
}

function fillTemplate(tpl, product, detailStr) {
  return tpl
    .replace(/{p}/g, product)
    .replace(/{d}/g, detailStr ? detailStr + '.' : '');
}

// ── Генераторы по соцсети ───────────────────────────────────────────────

function genVK(type, product, price, details, tone) {
  const d    = buildDetails(product, price, details);
  const open = pick(OPENS[tone]);
  const body = fillTemplate(pick(BODIES[type][tone] || BODIES[type]['friendly']), product, d);
  const close = pick(CLOSES[tone]);
  const tags  = (HASHTAGS.vk.base + ' ' + (HASHTAGS.vk[type] || '')).trim();
  return `${open}\n\n${body}\n\n${close}\n\n${tags}`;
}

function genTelegram(type, product, price, details, tone) {
  const d    = buildDetails(product, price, details);
  const open = pick(OPENS[tone]);
  const body = fillTemplate(pick(BODIES[type][tone] || BODIES[type]['friendly']), product, d);
  const close = pick(CLOSES[tone]);
  return `${open}\n\n${body}\n\n${close}`;
}

function genInstagram(type, product, price, details, tone) {
  const d    = buildDetails(product, price, details);
  const open = pick(OPENS[tone]);
  const body = fillTemplate(pick(BODIES[type][tone] || BODIES[type]['friendly']), product, d);
  const close = pick(CLOSES[tone]);
  const tags  = (HASHTAGS.instagram.base + ' ' + (HASHTAGS.instagram[type] || '')).trim();
  return `${open}\n\n${body}\n\n${close}\n\n.\n.\n.\n${tags}`;
}

const GENERATORS = { vk: genVK, telegram: genTelegram, instagram: genInstagram };
const NET_LABELS  = { vk: '💙 ВКонтакте', telegram: '✈️ Telegram', instagram: '📸 Instagram' };

// ── UI ──────────────────────────────────────────────────────────────────

function toggleNet(btn) { btn.classList.toggle('active'); }

function setTone(btn) {
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  tone = btn.dataset.tone;
}

function generate() {
  const product = document.getElementById('product').value.trim();
  const price   = document.getElementById('price').value.trim();
  const details = document.getElementById('details').value.trim();
  const type    = document.getElementById('postType').value;
  const nets    = [...document.querySelectorAll('.net-btn.active')].map(b => b.dataset.net);
  const err     = document.getElementById('errBox');

  err.style.display = 'none';
  if (!product) { err.textContent = 'Введи название ткани или товара'; err.style.display = 'block'; return; }
  if (!nets.length) { err.textContent = 'Выбери хотя бы одну соцсеть'; err.style.display = 'block'; return; }

  const container = document.getElementById('results');
  container.innerHTML = '';

  nets.forEach(net => {
    const text  = GENERATORS[net](type, product, price, details, tone);
    const block = document.createElement('div');
    block.className = 'card result-block';
    block.innerHTML = `
      <div class="result-header">
        <div class="result-net">${NET_LABELS[net]}</div>
        <button class="btn-copy" onclick="copyPost(this)">Копировать</button>
      </div>
      <div class="result-text">${escHtml(text)}</div>`;
    container.appendChild(block);
  });

  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyPost(btn) {
  const text = btn.closest('.card').querySelector('.result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Скопировано ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('copied'); }, 2000);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
