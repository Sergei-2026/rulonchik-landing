<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#6B3FA0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Контент">
  <title>Генератор постов</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --purple:  #6B3FA0;
      --purple2: #8B5CC8;
      --purple3: #F3EEFF;
      --green:   #2E7D32;
      --green2:  #E8F5E9;
      --red:     #C62828;
      --red2:    #FFEBEE;
      --gray:    #F5F5F5;
      --border:  #DDD;
      --text:    #222;
      --muted:   #888;
      --radius:  12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--gray);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 30px;
    }

    header {
      background: var(--purple);
      color: #fff;
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 12px; opacity: .75; margin-top: 3px; }

    .container { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* ── Карточка ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 12px;
    }

    /* ── Форма ── */
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .form-row input,
    .form-row select,
    .form-row textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      -webkit-appearance: none;
      font-family: inherit;
    }
    .form-row textarea { resize: vertical; min-height: 80px; }
    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus { outline: none; border-color: var(--purple2); }

    /* ── Соцсети ── */
    .networks { display: flex; gap: 8px; flex-wrap: wrap; }
    .net-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border: 2px solid var(--border);
      border-radius: 20px;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
    }
    .net-btn.active { border-color: var(--purple2); background: var(--purple3); color: var(--purple); }
    .net-btn .net-icon { font-size: 18px; }

    /* ── Тон ── */
    .tone-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .tone-btn {
      flex: 1; min-width: 80px;
      padding: 9px 8px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      color: var(--muted);
      transition: all .15s;
    }
    .tone-btn.active { border-color: var(--purple2); background: var(--purple3); color: var(--purple); }

    /* ── Кнопка генерации ── */
    .btn-generate {
      width: 100%;
      padding: 15px;
      background: var(--purple2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-generate:active { background: var(--purple); }
    .btn-generate:disabled { opacity: .5; cursor: default; }

    /* ── Спиннер ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-generate.loading .spinner { display: block; }
    .btn-generate.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Результат ── */
    .result-block {
      margin-bottom: 12px;
    }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .result-net {
      font-size: 13px; font-weight: 700;
      color: var(--purple);
      display: flex; align-items: center; gap: 6px;
    }
    .btn-copy {
      padding: 5px 12px;
      background: var(--purple3);
      border: 1.5px solid var(--purple2);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--purple);
      cursor: pointer;
      transition: background .15s;
    }
    .btn-copy.copied { background: var(--green2); border-color: var(--green); color: var(--green); }
    .result-text {
      background: var(--gray);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Ошибка ── */
    .error-box {
      background: var(--red2);
      border: 1.5px solid var(--red);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--red);
      display: none;
      margin-bottom: 14px;
    }

    /* ── API ключ ── */
    .api-row { display: flex; gap: 8px; }
    .api-row input { flex: 1; }
    .btn-save-key {
      padding: 11px 16px;
      background: var(--purple2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .key-status {
      font-size: 12px;
      margin-top: 6px;
      height: 16px;
    }
    .key-status.ok  { color: var(--green); }
    .key-status.err { color: var(--red); }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<header>
  <h1>✍️ Генератор постов</h1>
  <p>Магазин тканей · контент для соцсетей</p>
</header>

<div class="container">

  <!-- ── API ключ ── -->
  <div class="card" id="apiCard">
    <div class="card-title">🔑 API Ключ (один раз)</div>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-ant-...">
      <button class="btn-save-key" onclick="saveApiKey()">Сохранить</button>
    </div>
    <div class="key-status" id="keyStatus"></div>
    <p class="hint">Получи бесплатный ключ на <b>console.anthropic.com</b> → API Keys → Create Key.<br>Ключ хранится только в твоём браузере.</p>
  </div>

  <!-- ── Форма ── -->
  <div class="card">
    <div class="card-title">📋 О чём пост</div>

    <div class="form-row">
      <label>Тип публикации</label>
      <select id="postType">
        <option value="new">🆕 Новинка</option>
        <option value="sale">🏷 Акция / скидка</option>
        <option value="arrival">📦 Поступление товара</option>
        <option value="tip">🧵 Совет по пошиву</option>
        <option value="season">🌸 Сезонная коллекция</option>
        <option value="custom">✏️ Произвольный</option>
      </select>
    </div>

    <div class="form-row">
      <label>Название ткани / товара</label>
      <input type="text" id="product" placeholder="Лён натуральный, хлопок-стрейч…">
    </div>

    <div class="form-row">
      <label>Цена (необязательно)</label>
      <input type="text" id="price" placeholder="450 ₽/м, скидка 20%…">
    </div>

    <div class="form-row">
      <label>Детали (состав, цвета, особенности)</label>
      <textarea id="details" placeholder="100% лён, 12 цветов, ширина 150 см, мягкая фактура…"></textarea>
    </div>
  </div>

  <!-- ── Соцсети ── -->
  <div class="card">
    <div class="card-title">📱 Соцсети</div>
    <div class="networks">
      <button class="net-btn active" data-net="vk"        onclick="toggleNet(this)"><span class="net-icon">💙</span>ВКонтакте</button>
      <button class="net-btn active" data-net="telegram"  onclick="toggleNet(this)"><span class="net-icon">✈️</span>Telegram</button>
      <button class="net-btn active" data-net="instagram" onclick="toggleNet(this)"><span class="net-icon">📸</span>Instagram</button>
    </div>
  </div>

  <!-- ── Тон ── -->
  <div class="card">
    <div class="card-title">🎨 Тон текста</div>
    <div class="tone-row">
      <button class="tone-btn active" data-tone="friendly"     onclick="setTone(this)">😊 Дружелюбный</button>
      <button class="tone-btn"        data-tone="professional" onclick="setTone(this)">👔 Деловой</button>
      <button class="tone-btn"        data-tone="selling"      onclick="setTone(this)">🔥 Продающий</button>
    </div>
  </div>

  <!-- ── Ошибка ── -->
  <div class="error-box" id="errorBox"></div>

  <!-- ── Кнопка ── -->
  <button class="btn-generate" id="generateBtn" onclick="generate()">
    <div class="spinner"></div>
    <span class="btn-label">✨ Сгенерировать посты</span>
  </button>

  <!-- ── Результаты ── -->
  <div id="results" style="margin-top:16px;"></div>

</div>

<script>
// ── Состояние ──────────────────────────────────────────
let selectedTone = 'friendly';

const NET_LABELS = {
  vk:        '💙 ВКонтакте',
  telegram:  '✈️ Telegram',
  instagram: '📸 Instagram',
};

const TONE_LABELS = {
  friendly:     'дружелюбный, тёплый, как подруга рекомендует',
  professional: 'деловой, сдержанный, профессиональный',
  selling:      'яркий, продающий, с призывом к действию',
};

const TYPE_LABELS = {
  new:      'новинка в ассортименте',
  sale:     'акция или скидка',
  arrival:  'новое поступление товара',
  tip:      'полезный совет по пошиву',
  season:   'сезонная коллекция',
  custom:   'публикация',
};

const NET_INSTRUCTIONS = {
  vk: `ВКонтакте: 3–5 абзацев, живой текст, 5–7 хештегов в конце через пробел. Можно использовать эмодзи умеренно.`,
  telegram: `Telegram: короткий и ёмкий текст (2–3 абзаца), эмодзи органично по тексту, никаких хештегов.`,
  instagram: `Instagram: эмоциональный текст (2–3 абзаца), много эмодзи, 15–20 хештегов в конце отдельным блоком.`,
};

// ── API ключ ───────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('anthropic_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('keyStatus').textContent = 'Ключ сохранён ✓';
    document.getElementById('keyStatus').className = 'key-status ok';
  }
});

function saveApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key.startsWith('sk-ant-')) {
    document.getElementById('keyStatus').textContent = 'Неверный формат — должен начинаться с sk-ant-';
    document.getElementById('keyStatus').className = 'key-status err';
    return;
  }
  localStorage.setItem('anthropic_key', key);
  document.getElementById('keyStatus').textContent = 'Ключ сохранён ✓';
  document.getElementById('keyStatus').className = 'key-status ok';
}

// ── Соцсети ───────────────────────────────────────────
function toggleNet(btn) {
  btn.classList.toggle('active');
}

function getSelectedNets() {
  return [...document.querySelectorAll('.net-btn.active')].map(b => b.dataset.net);
}

// ── Тон ───────────────────────────────────────────────
function setTone(btn) {
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTone = btn.dataset.tone;
}

// ── Генерация ─────────────────────────────────────────
async function generate() {
  const apiKey  = localStorage.getItem('anthropic_key') || '';
  const product = document.getElementById('product').value.trim();
  const price   = document.getElementById('price').value.trim();
  const details = document.getElementById('details').value.trim();
  const type    = document.getElementById('postType').value;
  const nets    = getSelectedNets();

  // Валидация
  const errBox = document.getElementById('errorBox');
  errBox.style.display = 'none';

  if (!apiKey) {
    showError('Введи API ключ в блоке выше и нажми Сохранить');
    return;
  }
  if (!product) {
    showError('Введи название ткани или товара');
    return;
  }
  if (!nets.length) {
    showError('Выбери хотя бы одну соцсеть');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('results').innerHTML = '';

  // Строим промпт
  const netInstructions = nets.map(n => `• ${NET_INSTRUCTIONS[n]}`).join('\n');
  const priceStr  = price   ? `\nЦена: ${price}` : '';
  const detailStr = details ? `\nДетали: ${details}` : '';

  const prompt = `Ты — SMM-специалист магазина тканей. Напиши посты для соцсетей.

Тип публикации: ${TYPE_LABELS[type]}
Товар: ${product}${priceStr}${detailStr}
Тон: ${TONE_LABELS[selectedTone]}

Напиши отдельный пост для каждой соцсети:
${netInstructions}

Формат ответа — строго так, без лишних слов вокруг:
${nets.map(n => `[${n.toUpperCase()}]\n(текст поста)`).join('\n\n')}

Пиши по-русски. Текст должен быть готов к публикации.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Ошибка ${resp.status}`);
    }

    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    renderResults(text, nets);

  } catch (e) {
    showError(e.message || 'Не удалось подключиться к API');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── Парсинг ответа ─────────────────────────────────────
function renderResults(text, nets) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  // Разбиваем по маркерам [VK], [TELEGRAM], [INSTAGRAM]
  const parts = {};
  const regex = /\[([A-Z]+)\]\s*([\s\S]*?)(?=\[[A-Z]+\]|$)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    parts[match[1].toLowerCase()] = match[2].trim();
  }

  nets.forEach(net => {
    const postText = parts[net] || text.trim();
    const block = document.createElement('div');
    block.className = 'card result-block';
    block.innerHTML = `
      <div class="result-header">
        <div class="result-net">${NET_LABELS[net]}</div>
        <button class="btn-copy" onclick="copyPost(this)">Копировать</button>
      </div>
      <div class="result-text">${escHtml(postText)}</div>
    `;
    container.appendChild(block);
  });

  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyPost(btn) {
  const text = btn.closest('.card').querySelector('.result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Скопировано ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Копировать';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
